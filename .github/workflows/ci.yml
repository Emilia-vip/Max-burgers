name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - shared
          - services/product-service
          - services/order-service
          - services/kitchen-service
          - services/notification-service
          - services/api-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build shared package
        working-directory: shared
        run: |
          npm install
          npm run build

      - name: Install and test ${{ matrix.package }}
        working-directory: ${{ matrix.package }}
        run: |
          npm install
          npm test

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for system to be ready
        run: |
          for i in $(seq 1 90); do
            if curl -sf http://localhost/health > /dev/null 2>&1 \
              && curl -sf http://localhost/api/products > /dev/null 2>&1 \
              && curl -sf http://localhost/api/menus > /dev/null 2>&1; then
              echo "System is ready"
              sleep 5
              exit 0
            fi
            echo "Waiting for system... ($i/90)"
            sleep 5
          done
          echo "System failed to start"
          docker compose ps
          docker compose logs
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run E2E tests
        working-directory: tests/e2e
        run: |
          npm ci
          npm test

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs

      - name: Stop services
        if: always()
        run: docker compose down -v
